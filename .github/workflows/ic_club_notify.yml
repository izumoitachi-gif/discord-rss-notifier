name: IC Club 5-Category News Notifier

on:
  schedule:
    # 30分おき。notify.yml(0分・30分)とcron時刻を意図的にずらしている
    # (同一リポジトリで同時刻に複数scheduleがあるとGitHub側で競合しやすいため)
    - cron: "5,35 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ic-club-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run IC club notifier
        env:
          DISCORD_WEBHOOK_TOPIC1: ${{ secrets.DISCORD_WEBHOOK_TOPIC1 }}
          DISCORD_WEBHOOK_TOPIC2: ${{ secrets.DISCORD_WEBHOOK_TOPIC2 }}
          DISCORD_WEBHOOK_TOPIC3: ${{ secrets.DISCORD_WEBHOOK_TOPIC3 }}
          DISCORD_WEBHOOK_TOPIC4: ${{ secrets.DISCORD_WEBHOOK_TOPIC4 }}
          DISCORD_WEBHOOK_TOPIC5: ${{ secrets.DISCORD_WEBHOOK_TOPIC5 }}
        run: python ic_club_notifier.py

      - name: Commit updated ic_club_seen_urls.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ic_club_seen_urls.json
          git diff --staged --quiet || git commit -m "chore: update ic_club_seen_urls.json"
          git push
