name: 金融市場Bot Phase1(A案v3) BTC/ETH/SOL 5分ポーリング+21RSS速報検知
on:  # schedule re-register(GitHub cron認識ラグ回避のためのdummy touch)
  schedule:
    - cron: '2-59/5 * * * *'   # 5分間隔(2-59/5:過去事件の教訓で他workflowと衝突しない奇数時刻に)・パパ要件5-32「動いた瞬間」対応
  workflow_dispatch:
permissions:
  contents: write
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install feedparser
      - name: run
        env:
          MARKET_WEBHOOK_CRYPTO: ${{ secrets.MARKET_WEBHOOK_CRYPTO }}
        run: python crypto_price_poll.py
      - name: commit history+seen files
        run: |
          git config user.name "market-crypto-bot"
          git config user.email "actions@github.com"
          git add crypto_price_history.json crypto_seen_news.json || true
          git diff --staged --quiet || git commit -m "chore: update crypto history+seen_news [skip ci]"
          git push || true
