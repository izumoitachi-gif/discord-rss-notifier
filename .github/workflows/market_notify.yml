name: 金融市場Bot Phase2/3 開示・政策・SEC速報
on:  # 2026-07-23 schedule re-register(GitHub cron認識ラグ回避のためのdummy touch)
  schedule:
    - cron: '25,55 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install feedparser
      - name: run
        env:
          MARKET_WEBHOOK_TSE: ${{ secrets.MARKET_WEBHOOK_TSE }}
          MARKET_WEBHOOK_MACRO: ${{ secrets.MARKET_WEBHOOK_MACRO }}
          MARKET_WEBHOOK_WORLD: ${{ secrets.MARKET_WEBHOOK_WORLD }}
          MARKET_WEBHOOK_SOURCELOG: ${{ secrets.MARKET_WEBHOOK_SOURCELOG }}
        run: python market_news_bot.py
      - name: commit seen file
        run: |
          git config user.name "market-news-bot"
          git config user.email "actions@github.com"
          git add market_seen_urls.json || true
          git diff --staged --quiet || git commit -m "chore: update market_seen_urls.json [skip ci]"
          git push || true
