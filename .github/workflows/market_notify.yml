name: 金融市場Bot Phase2/3 開示・政策・SEC速報

on:
  schedule:
    # 25分・55分。ic_club_notify.yml(5,35)・ailab_news_notify.yml(15,45)とcron時刻を意図的にずらしている
    - cron: "25,55 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: market-news-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run market news notifier
        env:
          MARKET_WEBHOOK_TSE: ${{ secrets.MARKET_WEBHOOK_TSE }}
          MARKET_WEBHOOK_MACRO: ${{ secrets.MARKET_WEBHOOK_MACRO }}
          MARKET_WEBHOOK_WORLD: ${{ secrets.MARKET_WEBHOOK_WORLD }}
          MARKET_WEBHOOK_SOURCELOG: ${{ secrets.MARKET_WEBHOOK_SOURCELOG }}
        run: python market_news_bot.py

      - name: Commit updated market_seen_urls.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_seen_urls.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update market_seen_urls.json"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push && break
            echo "Push retry $i"
            sleep 3
          done
